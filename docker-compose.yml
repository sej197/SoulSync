services:
  server:
    image: sej197/soulsync-server:latest
    container_name: soulsync-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - python
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/data

  python:
    image: sej197/soulsync-python:latest
    container_name: soulsync-python
    ports:
      - "8000:8000"
    env_file:
      - ./python-server/.env
    volumes:
      - ./data:/data
      - hf_cache:/root/.cache/huggingface

  client:
    image: sej197/soulsync-client:latest
    container_name: soulsync-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://server:5000

  redis:
    image: redis:7
    container_name: soulsync-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  hf_cache:
